<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terra Incognita — Procedural Planet Generator</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        background: #0a0a0f;
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      #sidebar {
        width: 280px;
        flex-shrink: 0;
        padding: 1.5rem 1rem;
        background: #111118;
        border-right: 1px solid #222;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      #sidebar h1 {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #8af;
        margin: 0 0 0.5rem;
      }
      #canvas-container {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #05050a;
        gap: 8px;
      }
      canvas {
        max-width: 100%;
        image-rendering: pixelated;
      }
      #mode-buttons {
        display: flex;
        gap: 6px;
      }
      .mode-btn {
        padding: 4px 10px;
        background: #222;
        border: 1px solid #444;
        border-radius: 3px;
        color: #ccc;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .mode-btn.active {
        background: #1a3a6a;
        border-color: #8af;
        color: #8af;
      }
      #progress-bar-container {
        width: 1024px;
        max-width: 100%;
        height: 4px;
        background: #222;
        border-radius: 2px;
        display: none;
      }
      #progress-bar {
        height: 100%;
        background: #3a6;
        border-radius: 2px;
        width: 0%;
        transition: width 0.1s ease;
      }
      #planet-metrics-panel {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0,0,0,0.85);
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.75rem;
        font-size: 0.75rem;
        min-width: 180px;
        max-height: calc(100vh - 2rem);
        overflow-y: auto;
        display: none;
      }
      #planet-metrics-panel.visible { display: block; }
      #score-panel {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: rgba(0,0,0,0.85);
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.75rem;
        font-size: 0.75rem;
        min-width: 200px;
        max-height: calc(100vh - 2rem);
        overflow-y: auto;
        display: none;
      }
      #score-panel.visible { display: block; }
      #generate-btn {
        width: 100%;
        padding: 0.6rem;
        background: #3a6;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        font-size: 0.9rem;
      }
      #generate-btn:hover { background: #4b7; }
      #generate-btn:disabled { background: #444; cursor: not-allowed; }
      #status { font-size: 0.75rem; color: #888; min-height: 1.2em; }
      #export-buttons {
        display: none;
        flex-direction: column;
        gap: 4px;
        margin-top: 4px;
      }
      #export-buttons.visible { display: flex; }
      .export-btn {
        width: 100%;
        padding: 0.4rem;
        background: #1a2a3a;
        border: 1px solid #335;
        border-radius: 4px;
        color: #8af;
        font-size: 0.78rem;
        cursor: pointer;
      }
      .export-btn:hover { background: #1e3550; }
      /* ── Globe / Flat toggle ──────────────────────────────────────── */
      #view-toggle {
        width: 100%;
        padding: 0.4rem;
        background: #1a1a2a;
        border: 1px solid #446;
        border-radius: 4px;
        color: #aaf;
        font-size: 0.78rem;
        cursor: pointer;
        margin-top: 4px;
      }
      #view-toggle:hover { background: #222244; }
      /* ── Selected coordinates ────────────────────────────────────── */
      #selected-coords {
        font-size: 0.72rem;
        color: #9c9;
        min-height: 1.2em;
        text-align: center;
      }
      /* ── Generate-at-location button ─────────────────────────────── */
      #generate-location-btn {
        width: 100%;
        padding: 0.5rem;
        background: #1a3a1a;
        border: 1px solid #363;
        border-radius: 4px;
        color: #6c6;
        font-size: 0.82rem;
        cursor: pointer;
        display: none;
      }
      #generate-location-btn.visible { display: block; }
      #generate-location-btn:hover { background: #1f4a1f; }
      #generate-location-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
      /* ── Tile detail panel ───────────────────────────────────────── */
      #tile-detail-panel {
        position: absolute;
        bottom: 1rem;
        right: 1rem;
        background: rgba(0,0,0,0.92);
        border: 1px solid #446;
        border-radius: 4px;
        padding: 0.6rem;
        font-size: 0.72rem;
        display: none;
        max-width: 540px;
        max-height: calc(100vh - 4rem);
        overflow-y: auto;
        will-change: transform;
      }
      #tile-detail-panel.visible { display: block; }
      #tile-panel-titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: grab;
        margin-bottom: 0.4rem;
        user-select: none;
      }
      #tile-panel-titlebar:active { cursor: grabbing; }
      #tile-panel-titlebar span {
        font-size: 0.8rem;
        color: #aaf;
        font-weight: 700;
      }
      #tile-panel-close {
        background: none;
        border: none;
        color: #666;
        font-size: 1.1rem;
        line-height: 1;
        cursor: pointer;
        padding: 0 0 0 8px;
        flex-shrink: 0;
      }
      #tile-panel-close:hover { color: #fff; }
      #tile-canvas-container canvas {
        max-width: 100%;
        image-rendering: pixelated;
        display: block;
        margin-bottom: 0.4rem;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #ccc;
      }
      .detail-label { color: #888; }
      .consistency-pass { color: #6c6; }
      .consistency-fail { color: #c66; }
      .consistency-mixed { color: #ca6; }
      .detail-export-btn {
        display: block;
        width: 100%;
        margin-top: 4px;
        padding: 0.3rem;
        background: #1a2a3a;
        border: 1px solid #335;
        border-radius: 3px;
        color: #8af;
        font-size: 0.72rem;
        cursor: pointer;
        text-align: center;
      }
      .detail-export-btn:hover { background: #1e3550; }
    </style>
  </head>
  <body>
    <aside id="sidebar">
      <h1>Terra Incognita</h1>
      <div id="sliders-container"></div>
      <button id="generate-btn">Generate</button>
      <button id="view-toggle">Globe View</button>
      <div id="selected-coords"></div>
      <button id="generate-location-btn" disabled>Generate at Location</button>
      <div id="status">Ready.</div>
      <div id="export-buttons">
        <select id="export-resolution" style="width:100%;padding:0.3rem;background:#1a2a3a;
          border:1px solid #335;border-radius:4px;color:#8af;font-size:0.78rem;margin-bottom:2px">
          <option value="512x256">512 × 256 (preview)</option>
          <option value="1024x512" selected>1024 × 512 (default)</option>
          <option value="2048x1024">2048 × 1024 (high-res)</option>
          <option value="4096x2048">4096 × 2048 (print)</option>
        </select>
        <button class="export-btn" id="btn-overview-png">Download Planet PNG</button>
        <button class="export-btn" id="btn-png">Download Tile PNG (16-bit)</button>
        <button class="export-btn" id="btn-raw">Download Tile RAW (.f32)</button>
      </div>
    </aside>

    <div id="canvas-container">
      <div id="mode-buttons">
        <button class="mode-btn active" data-mode="hillshade">Hillshade</button>
        <button class="mode-btn" data-mode="elevation">Elevation</button>
        <button class="mode-btn" data-mode="regime">Regime</button>
      </div>
      <div id="main-canvas-wrapper" style="position:relative;max-width:100%;line-height:0">
        <canvas id="main-canvas" width="1024" height="512"></canvas>
      </div>
      <div id="globe-container" style="width:1024px;max-width:100%;height:512px;display:none;position:relative"></div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="planet-metrics-panel"></div>
      <div id="score-panel"></div>
      <div id="tile-detail-panel">
        <div id="tile-panel-titlebar">
          <span>Tile at Location</span>
          <button id="tile-panel-close" title="Close">×</button>
        </div>
        <div id="tile-canvas-container"></div>
        <div id="tile-info"></div>
        <div id="tile-consistency"></div>
        <button class="detail-export-btn" id="btn-tile-png">Download Tile PNG (16-bit)</button>
        <button class="detail-export-btn" id="btn-tile-raw">Download Tile RAW (.f32)</button>
        <button class="detail-export-btn" id="btn-tile-meta">Download Metadata JSON</button>
      </div>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
